schema_version: "1.2"
version: 1
skills:
  - id: feature-delivery
    owner: core-platform
    stability: stable
    intent_patterns:
      - implement feature
      - add capability
      - build module
    examples:
      - implement feature X in api
      - add support for new retrieval backend
    agent: implementer
    prompt_template: prompts/feature-request.md
    eval_profile: evals/adherence-rubric.yaml
  - id: bugfix
    owner: core-platform
    stability: stable
    intent_patterns:
      - fix bug
      - resolve error
      - failing test
    examples:
      - fix failing test in instruction checker
      - resolve startup error in worker
    agent: implementer
    prompt_template: prompts/bugfix-request.md
    eval_profile: evals/adherence-rubric.yaml
  - id: code-review
    owner: quality-engineering
    stability: stable
    intent_patterns:
      - review
      - audit changes
      - identify risks
    examples:
      - review this PR for regressions
      - audit recent migration changes
    agent: reviewer
    prompt_template: prompts/review-request.md
    eval_profile: evals/review-rubric.yaml
  - id: docs-sync
    owner: docs-governance
    stability: beta
    intent_patterns:
      - update readme
      - sync docs
      - align roadmap docs
    examples:
      - sync readme after roadmap update
      - align docs with new phase status
    agent: planner
    prompt_template: prompts/docs-request.md
    eval_profile: evals/adherence-rubric.yaml
