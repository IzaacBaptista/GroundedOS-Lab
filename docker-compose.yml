services:
  # PostgreSQL database — persistent storage for indexes, memory, users
  postgres:
    image: postgres:16-alpine
    container_name: groundedos-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-groundedos}
      POSTGRES_USER: ${POSTGRES_USER:-groundedos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-groundedos-dev-password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - groundedos_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-groundedos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - groundedos_network

  # Redis — message queue and cache layer
  redis:
    image: redis:7-alpine
    container_name: groundedos-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-groundedos-dev-password}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - groundedos_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - groundedos_network

  # API server — Node.js backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: groundedos-api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-groundedos}:${POSTGRES_PASSWORD:-groundedos-dev-password}@postgres:5432/${POSTGRES_DB:-groundedos}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-groundedos}
      POSTGRES_USER: ${POSTGRES_USER:-groundedos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-groundedos-dev-password}
      
      # Queue
      REDIS_URL: redis://:${REDIS_PASSWORD:-groundedos-dev-password}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-groundedos-dev-password}
      
      # GroundedOS Lab
      GROUNDEDOS_INDEX_DIR: /app/.groundedos/indexes
      GROUNDEDOS_MEMORY_DIR: /app/.groundedos/memory/sessions
      
      # Optional Ollama
      GROUNDEDOS_OLLAMA_BASE_URL: ${GROUNDEDOS_OLLAMA_BASE_URL:-http://localhost:11434}
      GROUNDEDOS_OLLAMA_EMBED_MODEL: ${GROUNDEDOS_OLLAMA_EMBED_MODEL:-embeddinggemma}
      GROUNDEDOS_OLLAMA_EMBED_DIMENSIONS: ${GROUNDEDOS_OLLAMA_EMBED_DIMENSIONS:-768}
      GROUNDEDOS_OLLAMA_GENERATE_MODEL: ${GROUNDEDOS_OLLAMA_GENERATE_MODEL:-qwen2.5:0.5b}

      # Optional OpenAI embeddings
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_ORG_ID: ${OPENAI_ORG_ID:-}
      OPENAI_PROJECT_ID: ${OPENAI_PROJECT_ID:-}
      GROUNDEDOS_OPENAI_BASE_URL: ${GROUNDEDOS_OPENAI_BASE_URL:-https://api.openai.com/v1}
      GROUNDEDOS_OPENAI_EMBED_MODEL: ${GROUNDEDOS_OPENAI_EMBED_MODEL:-text-embedding-3-small}
      GROUNDEDOS_OPENAI_EMBED_DIMENSIONS: ${GROUNDEDOS_OPENAI_EMBED_DIMENSIONS:-1536}
      GROUNDEDOS_OPENAI_REQUEST_TIMEOUT_MS: ${GROUNDEDOS_OPENAI_REQUEST_TIMEOUT_MS:-30000}
      
      # Auth (Phase 6)
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JWT_EXPIRY: ${JWT_EXPIRY:-24h}
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret-change-in-production}
      
      # Observability (Phase 6 — OpenTelemetry)
      OTEL_EXPORT_ENABLED: ${OTEL_EXPORT_ENABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otelcol:4318}
      OTEL_SERVICE_NAME: groundedos-api
      
    ports:
      - "${API_PORT:-3001}:3001"
    volumes:
      - groundedos_app_data:/app/.groundedos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - groundedos_network
    restart: unless-stopped

  # Web UI — React frontend with Vite
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: groundedos-web
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      API_BASE_URL: ${API_BASE_URL:-http://api:3001}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://api:3001}
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/index.html:/app/apps/web/index.html
    depends_on:
      - api
    networks:
      - groundedos_network
    restart: unless-stopped

  # Python Worker — asyncio-based task processor for ML jobs
  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    container_name: groundedos-worker
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-groundedos-dev-password}@redis:6379
      POSTGRES_URL: postgresql://${POSTGRES_USER:-groundedos}:${POSTGRES_PASSWORD:-groundedos-dev-password}@postgres:5432/${POSTGRES_DB:-groundedos}
      GROUNDEDOS_INDEX_DIR: /app/.groundedos/indexes
      GROUNDEDOS_MEMORY_DIR: /app/.groundedos/memory/sessions
      
      # Observability (Phase 6 — OpenTelemetry)
      OTEL_EXPORT_ENABLED: ${OTEL_EXPORT_ENABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otelcol:4318}
      OTEL_SERVICE_NAME: groundedos-worker
    volumes:
      - groundedos_app_data:/app/.groundedos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - groundedos_network
    restart: unless-stopped

  # ============================================================================
  # OBSERVABILITY STACK (Profile: observability)
  # Start with: docker-compose --profile observability up -d
  # ============================================================================

  # OpenTelemetry Collector — receives and exports traces/metrics
  otelcol:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: groundedos-otelcol
    profiles:
      - observability
    command: [--config=/etc/otel-collector-config.yaml]
    volumes:
      - ./config/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      # OTLP gRPC receiver
      - "4317:4317"
      # OTLP HTTP receiver
      - "4318:4318"
      # Prometheus metrics receiver
      - "8888:8888"
      # Health check
      - "13133:13133"
    environment:
      GOGC: "80"
    depends_on:
      - jaeger
      - prometheus
    networks:
      - groundedos_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:13133"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Jaeger UI — visualize distributed traces
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: groundedos-jaeger
    profiles:
      - observability
    ports:
      # Jaeger UI
      - "16686:16686"
      # OTLP gRPC receiver (via collector)
      - "14317:14317"
      # OTLP HTTP receiver
      - "14318:14318"
      # Zipkin receiver
      - "9411:9411"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      MEMORY_MAX_TRACES: "10000"
    networks:
      - groundedos_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:14269"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prometheus — scrape metrics from services
  prometheus:
    image: prom/prometheus:latest
    container_name: groundedos-prometheus
    profiles:
      - observability
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - groundedos_prometheus_data:/prometheus
    ports:
      # Prometheus UI / metrics endpoint
      - "9090:9090"
    environment:
      GOGC: "80"
    networks:
      - groundedos_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Grafana — visualize Prometheus metrics (optional)
  grafana:
    image: grafana/grafana:latest
    container_name: groundedos-grafana
    profiles:
      - observability
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: "grafana-clock-panel,grafana-simple-json-datasource"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - groundedos_grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - groundedos_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  groundedos_network:
    driver: bridge

volumes:
  groundedos_postgres_data:
    driver: local
  groundedos_redis_data:
    driver: local
  groundedos_app_data:
    driver: local
  groundedos_prometheus_data:
    driver: local
  groundedos_grafana_data:
    driver: local
