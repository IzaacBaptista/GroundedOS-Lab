schema_version: "1.3"
adapters:
  codex:
    source_of_truth:
      - instructions/manifest.yaml
      - agents/*.yaml
      - skills/registry.yaml
      - context/*.yaml
      - prompts/*.md
      - evals/*.yaml
    output_format: bundle-json+markdown
    merge_strategy: ordered-first-wins
    context_window_policy:
      max_files: 24
      include_user_request: true
  copilot_chat_vscode:
    source_of_truth:
      - instructions/manifest.yaml
      - agents/*.yaml
      - skills/registry.yaml
      - context/*.yaml
      - prompts/*.md
      - evals/*.yaml
    output_format: bundle-json+markdown
    merge_strategy: ordered-first-wins
    context_window_policy:
      max_files: 24
      include_user_request: true
  github_copilot:
    source_of_truth:
      - instructions/manifest.yaml
      - agents/*.yaml
      - skills/registry.yaml
      - context/*.yaml
      - prompts/*.md
      - evals/*.yaml
    output_format: bundle-json+markdown
    merge_strategy: ordered-first-wins
    context_window_policy:
      max_files: 24
      include_user_request: true
notes:
  en: Adapters must translate format, never change policy semantics.
  pt-BR: Adaptadores devem traduzir formato, nunca alterar a semantica das politicas.
